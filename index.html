<body>

<h2>🔥 Typography Maker Pro</h2>

<input id="hook" placeholder="Hook text">
<input id="body" placeholder="Body text">

<br>

<button onclick="updateText()">Generate</button>
<button onclick="downloadImage()">Download</button>

<script>
function updateText() {
  hookText.innerText = hook.value;
  bodyText.innerText = body.value;
  highlightText.innerText = highlight.value;
}

function downloadImage() {
  html2canvas(document.getElementById("preview")).then(canvas => {
    let link = document.createElement("a");
    link.download = "typography.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}
